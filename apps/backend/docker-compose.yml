services:
  webserver:
    image: nginx:latest
    container_name: webserver
    ports:
      - "3000:3000"
    networks:
      - stagin-network

  frontend:
    container_name: frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
    volumes:
      - ../frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - stagin-network
    develop:
      watch:
        - action: sync
          path: ../frontend/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ../frontend/package.json

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - stagin-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json

  lora:
    container_name: lora
    build:
      context: ../lora
      dockerfile: Dockerfile
    networks:
      - stagin-network

volumes:
  data:

networks:
  stagin-network:
    driver: bridge
